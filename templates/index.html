<!DOCTYPE html>
<html>
<head>
    <title>AI Resume Analyzer</title>
</head>
<body>

<h2>Upload Resume & Job Description</h2>

<form method="POST" enctype="multipart/form-data">
    <input type="file" name="resume" required><br><br>

    <textarea name="job_desc" rows="6" cols="50" placeholder="Paste Job Description"></textarea><br><br>

    <button type="submit">Analyze</button>
</form>

{% if result %}
<h3>Results:</h3>

<p><b>Emails:</b> {{ result.emails }}</p>
<p><b>Phones:</b> {{ result.phones }}</p>
<p><b>Skills:</b> {{ result.skills }}</p>
<p><b>Entities:</b> {{ result.entities }}</p>

<h3>Match Score: {{ result.match_score }}%</h3>
{% endif %}

</body>
</html>
